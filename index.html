<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buggy Productions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #16213e;
            padding: 1.5rem 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            width: 80px;
            height: auto;
            display: block;
            margin: 0 auto 0.8rem;
        }
        .sidebar-title {
            text-align: center;
            font-size: 0.85rem;
            color: #e94560;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        /* ── Menu sections ── */
        .menu-section { margin-bottom: 0.5rem; }
        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 1.25rem;
            cursor: pointer;
            color: #ccc;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            transition: color 0.2s, background 0.2s;
        }
        .menu-header:hover {
            color: #fff;
            background: rgba(233, 69, 96, 0.1);
        }
        .menu-header .arrow {
            font-size: 0.7rem;
            transition: transform 0.25s;
        }
        .menu-header.open .arrow {
            transform: rotate(90deg);
        }
        .menu-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .menu-items.open {
            max-height: 500px;
        }
        .menu-items a {
            display: block;
            padding: 8px 1.25rem 8px 2.5rem;
            color: #999;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s, background 0.2s;
        }
        .menu-items a:hover {
            color: #fff;
            background: rgba(233, 69, 96, 0.08);
        }
        .menu-items a .date {
            float: right;
            color: #555;
            font-size: 0.75rem;
        }

        /* ── Static menu items ── */
        .static-link {
            display: block;
            padding: 10px 1.25rem;
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s, background 0.2s;
        }
        .static-link:hover {
            color: #fff;
            background: rgba(233, 69, 96, 0.1);
        }

        /* ── Main content ── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .welcome {
            text-align: center;
            max-width: 420px;
        }
        .welcome-logo {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .welcome h1 {
            font-size: 1.3rem;
            color: #e94560;
            margin-bottom: 0.3rem;
        }
        .welcome .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .welcome .feature-link {
            display: inline-block;
            background: #e94560;
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: background 0.2s;
        }
        .welcome .feature-link:hover { background: #c73652; }
        .welcome .hint {
            margin-top: 2rem;
            color: #555;
            font-size: 0.8rem;
        }

        /* ── Mobile ── */
        .hamburger {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 10;
            background: #16213e;
            border: none;
            color: #fff;
            font-size: 1.4rem;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .hamburger { display: block; }
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 20;
            }
            .sidebar.open { transform: translateX(0); }
            .main { padding-top: 4rem; }
        }
    </style>
</head>
<body>

    <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

    <nav class="sidebar">
        <img src="logo.jpg" alt="Buggy Productions" class="sidebar-logo">
        <div class="sidebar-title">Buggy Productions</div>

        <!-- Quizzes (expandable) -->
        <div class="menu-section">
            <div class="menu-header" onclick="toggleMenu(this)">
                <span>クイズ Quizzes</span>
                <span class="arrow">▶</span>
            </div>
            <div class="menu-items">
                <a href="kanjiquiz604.html">漢字 6/4 — 演・漁・漫<span class="date">Jun 4</span></a>
                <a href="quiz526.html">第6回 クイズ 5/26<span class="date">May 26</span></a>
                <a href="kanjiquiz526.html">漢字 5/26<span class="date">May 26</span></a>
                <a href="kanjiquiz519.html">第5回 漢字 5/19<span class="date">May 19</span></a>
            </div>
        </div>

        <!-- Games (expandable) -->
        <div class="menu-section">
            <div class="menu-header" onclick="toggleMenu(this)">
                <span>ゲーム Games</span>
                <span class="arrow">▶</span>
            </div>
            <div class="menu-items">
                <a href="kanji-quest.html">漢字クエスト Kanji Quest<span class="date">New</span></a>
            </div>
        </div>

        <!-- Placeholder sections for future expansion -->
        <div class="menu-section">
            <div class="menu-header" onclick="toggleMenu(this)">
                <span>語彙 Vocabulary</span>
                <span class="arrow">▶</span>
            </div>
            <div class="menu-items">
                <span style="display:block;padding:8px 1.25rem 8px 2.5rem;color:#555;font-size:0.8rem;">Coming soon</span>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-header" onclick="toggleMenu(this)">
                <span>漢字 Kanji</span>
                <span class="arrow">▶</span>
            </div>
            <div class="menu-items">
                <span style="display:block;padding:8px 1.25rem 8px 2.5rem;color:#555;font-size:0.8rem;">Coming soon</span>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="welcome">
            <img src="logo.jpg" alt="Buggy Productions" class="welcome-logo">
            <h1>日本語学習</h1>
            <p class="subtitle">Advanced Japanese Class — Spring 2026</p>
            <a href="kanjiquiz604.html" class="feature-link">Latest: 漢字クイズ 6/4</a>
            <p class="hint">← Use the menu to browse quizzes</p>
        </div>
    </main>

    <script>
        function toggleMenu(header) {
            header.classList.toggle('open');
            const items = header.nextElementSibling;
            items.classList.toggle('open');
        }
    </script>
</body>
</html>
