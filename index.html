<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buggy Productions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 2rem;
        }
        .coming-soon {
            color: #666;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Buggy Productions" class="logo">
        <p class="coming-soon">Coming Soon</p>
    </div>
</body>
</html>
