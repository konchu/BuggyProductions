<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字クイズ - 演・漁・漫</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .quiz-container {
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 { text-align: center; font-size: 1.4em; margin-bottom: 4px; color: #e94560; }
  .subtitle { text-align: center; font-size: 0.8em; color: #888; margin-bottom: 16px; }
  .progress { text-align: center; font-size: 0.85em; color: #888; margin-bottom: 24px; }
  .question-type { text-align: center; font-size: 0.75em; color: #e94560; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .question-text { text-align: center; font-size: 3.5em; margin: 16px 0; color: #fff; line-height: 1.5; }
  .choices { display: flex; flex-direction: column; gap: 12px; margin: 24px 0; }
  .choice-btn {
    background: #0f3460; border: 2px solid #0f3460; color: #e0e0e0;
    padding: 14px 20px; border-radius: 10px; font-size: 1.3em;
    cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { background: #1a4a7a; border-color: #e94560; }
  .choice-btn.correct { background: #2d6a4f; border-color: #52b788; color: #fff; }
  .choice-btn.wrong { background: #6a2d2d; border-color: #e94560; color: #fff; }
  .result-box { text-align: center; padding: 16px; border-radius: 10px; margin: 16px 0; display: none; }
  .result-box.show { display: block; }
  .result-box.correct { background: #2d6a4f; }
  .result-box.wrong { background: #6a2d2d; }
  .result-box .reading { font-size: 1.3em; margin-bottom: 4px; color: #fff; }
  .result-box .explanation { font-size: 0.95em; margin-top: 8px; color: #ccc; line-height: 1.4; }
  .next-btn {
    display: none; width: 100%; background: #e94560; border: none; color: #fff;
    padding: 14px; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 12px;
  }
  .next-btn:hover { background: #c73652; }
  .next-btn.show { display: block; }
  .score-screen { text-align: center; }
  .score-screen .score { font-size: 3em; color: #e94560; margin: 20px 0; }
  .score-screen .message { font-size: 1.1em; margin-bottom: 8px; }
  .review-list { text-align: left; margin: 16px 0; font-size: 0.9em; color: #aaa; line-height: 1.8; }
  .review-list .missed { color: #e94560; font-size: 1.2em; }
  .restart-btn {
    background: #e94560; border: none; color: #fff; padding: 14px 40px;
    border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px;
  }
  .restart-btn:hover { background: #c73652; }
</style>
</head>
<body>
<div class="quiz-container" id="quiz"></div>
<script>
const questions = [
  { type: '読みクイズ', question: '演じる', choices: ['えんじる', 'えんずる', 'えんじるう', 'おんじる'], correct: 0, explanation: 'えんじる — perform' },
  { type: '読みクイズ', question: '演奏', choices: ['えんそう', 'えんぞう', 'えんそうる', 'おんそう'], correct: 0, explanation: 'えんそう — musical performance' },
  { type: '読みクイズ', question: '演劇', choices: ['えんげき', 'えんぐき', 'えんけき', 'おんげき'], correct: 0, explanation: 'えんげき — drama' },
  { type: '読みクイズ', question: '演技', choices: ['えんぎ', 'えんげ', 'えんき', 'おんぎ'], correct: 0, explanation: 'えんぎ — acting' },
  { type: '読みクイズ', question: '演説', choices: ['えんせつ', 'えんぜつ', 'えんせち', 'おんせつ'], correct: 0, explanation: 'えんせつ — speech' },
  { type: '読みクイズ', question: '講演', choices: ['こうえん', 'こうおん', 'こうえら', 'こうえんじ'], correct: 0, explanation: 'こうえん — lecture' },
  { type: '読みクイズ', question: '演習', choices: ['えんしゅう', 'えんじゅう', 'えんしゅ', 'おんしゅう'], correct: 0, explanation: 'えんしゅう — practice' },
  { type: '読みクイズ', question: '漁業', choices: ['ぎょぎょう', 'ぎょぎょ', 'ぎょうぎょう', 'りょうぎょう'], correct: 0, explanation: 'ぎょぎょう — fishing industry' },
  { type: '読みクイズ', question: '漁村', choices: ['ぎょそん', 'ぎょむら', 'ぎょうそん', 'りょうそん'], correct: 0, explanation: 'ぎょそん — fishing village' },
  { type: '読みクイズ', question: '漁船', choices: ['ぎょせん', 'ぎょふね', 'ぎょうせん', 'りょうせん'], correct: 0, explanation: 'ぎょせん — fishing boat' },
  { type: '読みクイズ', question: '漁師', choices: ['りょうし', 'ぎょし', 'りょうさ', 'ぎょざ'], correct: 0, explanation: 'りょうし — fisherman' },
  { type: '読みクイズ', question: '漫画', choices: ['まんが', 'まんく', 'まんか', 'ばんが'], correct: 0, explanation: 'まんが — manga (comic)' },
  { type: '読みクイズ', question: '漫才', choices: ['まんざい', 'まんさい', 'まんずい', 'ばんざい'], correct: 0, explanation: 'まんざい — two-person comedy act' }
];

let currentIndex = 0, score = 0, shuffled = [], wrongAnswers = [];

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startQuiz() {
  shuffled = shuffle(questions.map(function(q, i) { return Object.assign({}, q, {_idx: i}); }));
  currentIndex = 0; score = 0; wrongAnswers = [];
  showQuestion();
}

function showQuestion() {
  var q = shuffled[currentIndex];
  document.getElementById('quiz').innerHTML =
    '<h1>漢字クイズ</h1>' +
    '<div class="subtitle">演・漁・漫 — JLPT N2</div>' +
    '<div class="progress">' + (currentIndex + 1) + ' / ' + shuffled.length + '</div>' +
    '<div class="question-type">' + q.type + '</div>' +
    '<div class="question-text">' + q.question + '</div>' +
    '<div class="choices" id="choices"></div>' +
    '<div class="result-box" id="result"><div class="reading" id="resultText"></div><div class="explanation" id="explanation"></div></div>' +
    '<button class="next-btn" id="nextBtn" onclick="nextQuestion()">' + (currentIndex < shuffled.length - 1 ? '次へ \u2192' : '結果を見る \u2192') + '</button>';
  var choiceIndices = [];
  for (var k = 0; k < q.choices.length; k++) choiceIndices.push(k);
  var shuffledIndices = shuffle(choiceIndices);
  var choicesEl = document.getElementById('choices');
  shuffledIndices.forEach(function(ci) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = q.choices[ci];
    btn.dataset.index = ci;
    btn.onclick = function() { checkAnswer(btn, ci, q); };
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn, chosenIdx, q) {
  var buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(function(b) { b.disabled = true; });
  var isCorrect = chosenIdx === q.correct;
  if (isCorrect) { score++; btn.classList.add('correct'); }
  else {
    btn.classList.add('wrong');
    buttons.forEach(function(b) { if (parseInt(b.dataset.index) === q.correct) b.classList.add('correct'); });
    wrongAnswers.push({ question: q.question, correctAnswer: q.choices[q.correct], explanation: q.explanation });
  }
  var resultBox = document.getElementById('result');
  resultBox.classList.add('show', isCorrect ? 'correct' : 'wrong');
  document.getElementById('resultText').textContent = isCorrect ? '\u2713 正解！' : '\u2717 不正解';
  document.getElementById('explanation').textContent = q.explanation;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < shuffled.length) showQuestion();
  else showScore();
}

function showScore() {
  var pct = Math.round((score / shuffled.length) * 100);
  var message = pct === 100 ? '完璧です！' : pct >= 80 ? 'よくできました！' : pct >= 60 ? 'もう少し練習しよう！' : '復習してからもう一度！';
  var reviewHTML = '';
  if (wrongAnswers.length > 0) {
    reviewHTML = '<div class="review-list"><strong>間違えた問題：</strong><br>';
    wrongAnswers.forEach(function(w) {
      reviewHTML += '<span class="missed">\u30fb' + w.question + '</span><br>' +
        '&nbsp;&nbsp;読み: ' + w.correctAnswer + '<br>' +
        '&nbsp;&nbsp;' + w.explanation + '<br>';
    });
    reviewHTML += '</div>';
  }
  document.getElementById('quiz').innerHTML =
    '<div class="score-screen">' +
      '<h1>結果</h1>' +
      '<div class="score">' + score + ' / ' + shuffled.length + '</div>' +
      '<div class="message">' + message + '</div>' +
      reviewHTML +
      '<button class="restart-btn" onclick="startQuiz()">もう一度</button>' +
    '</div>';
}

startQuiz();
</script>
</body>
</html>
