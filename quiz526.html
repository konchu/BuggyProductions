<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語クイズ - 第6回 読みクイズ 5/26</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .quiz-container {
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    font-size: 1.4em;
    margin-bottom: 4px;
    color: #e94560;
  }
  .subtitle {
    text-align: center;
    font-size: 0.8em;
    color: #888;
    margin-bottom: 16px;
  }
  .progress {
    text-align: center;
    font-size: 0.85em;
    color: #888;
    margin-bottom: 24px;
  }
  .question-type {
    text-align: center;
    font-size: 0.75em;
    color: #e94560;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .kanji-word {
    text-align: center;
    font-size: 3.5em;
    margin: 20px 0;
    color: #fff;
    line-height: 1.3;
    font-weight: bold;
  }
  .instruction {
    text-align: center;
    font-size: 0.9em;
    margin: 8px 0 16px;
    color: #aaa;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 24px 0;
  }
  .choice-btn {
    background: #0f3460;
    border: 2px solid #0f3460;
    color: #e0e0e0;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 1.4em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  }
  .choice-btn:hover:not(:disabled) {
    background: #1a4a7a;
    border-color: #e94560;
  }
  .choice-btn.correct {
    background: #2d6a4f;
    border-color: #52b788;
    color: #fff;
  }
  .choice-btn.wrong {
    background: #6a2d2d;
    border-color: #e94560;
    color: #fff;
  }
  .result-box {
    text-align: center;
    padding: 16px;
    border-radius: 10px;
    margin: 16px 0;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.correct { background: #2d6a4f; }
  .result-box.wrong { background: #6a2d2d; }
  .result-box .label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .result-box.correct .label { color: #52b788; }
  .result-box.wrong .label { color: #e94560; }
  .result-box .reading {
    font-size: 1.5em;
    margin-bottom: 8px;
  }
  .result-box.correct .reading { color: #52b788; }
  .result-box.wrong .reading { color: #e94560; }
  .result-box .meaning {
    font-size: 1.1em;
    color: #fff;
    line-height: 1.5;
  }
  .next-btn {
    display: none;
    width: 100%;
    background: #e94560;
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 10px;
    font-size: 1.1em;
    cursor: pointer;
    margin-top: 12px;
  }
  .next-btn:hover { background: #c73652; }
  .next-btn.show { display: block; }
  .score-screen { text-align: center; }
  .score-screen .score {
    font-size: 3em;
    color: #e94560;
    margin: 20px 0;
  }
  .score-screen .message {
    font-size: 1.1em;
    margin-bottom: 8px;
  }
  .review-list {
    text-align: left;
    margin: 16px 0;
    font-size: 0.85em;
    color: #aaa;
    line-height: 1.6;
  }
  .review-list .missed { color: #e94560; }
  .review-list .kanji-review { font-size: 1.3em; color: #fff; }
  .restart-btn {
    background: #e94560;
    border: none;
    color: #fff;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 1.1em;
    cursor: pointer;
    margin-top: 20px;
  }
  .restart-btn:hover { background: #c73652; }
</style>
</head>
<body>
<div class="quiz-container" id="quiz"></div>

<script>
const quizData = [
  // === 性格をあらわす言葉 (Personality vocabulary) ===
  { kanji: "性格",   reading: "せいかく",   wrong: ["しょうかく", "せいかつ", "せいこう"], meaning: "personality / character" },
  { kanji: "几帳面", reading: "きちょうめん", wrong: ["きじょうめん", "きちょうべん", "きじょうべん"], meaning: "organized, tidy, neat" },
  { kanji: "頼りになる", reading: "たよりになる", wrong: ["たよりになる", "たよりぬる", "たのしくなる"], meaning: "reliable / dependable" },
  { kanji: "怒りっぽい", reading: "おこりっぽい", wrong: ["いかりっぽい", "おこりずらい", "いかりやすい"], meaning: "gets angry easily" },
  { kanji: "頑固",   reading: "がんこ",     wrong: ["かんこ", "がんご", "かんご"], meaning: "stubborn / obstinate" },
  // === Textbook P.46 / P.53 / P.54 vocabulary ===
  { kanji: "尊敬する", reading: "そんけいする", wrong: ["そんかいする", "じんけいする", "そんかいすう"], meaning: "to respect / admire" },
  { kanji: "人物",   reading: "にんぶつ",   wrong: ["じんぶつ", "にんもつ", "じんもつ"], meaning: "person / character" },
  { kanji: "説明",   reading: "せつめい",   wrong: ["せつめく", "せつめい", "せつめく"], meaning: "explanation / description" },
  { kanji: "歴史",   reading: "れきし",     wrong: ["れきじ", "れきず", "れきす"], meaning: "history" },
  { kanji: "家族",   reading: "かぞく",     wrong: ["かたく", "かたく", "かぞっく"], meaning: "family" },
  { kanji: "友人",   reading: "ゆうじん",   wrong: ["ゆうにん", "ゆうじ", "ゆにん"], meaning: "friend" },
  { kanji: "映画",   reading: "えいが",     wrong: ["えいぎょう", "えいか", "えいこう"], meaning: "movie / film" },
  { kanji: "紹介",   reading: "しょうかい", wrong: ["しょうがい", "しょうか", "しょうけい"], meaning: "introduction / recommendation" },
  { kanji: "特徴",   reading: "とくちょう", wrong: ["とくちよう", "とくじょう", "とくじょ"], meaning: "feature / characteristic" },
  { kanji: "会話",   reading: "かいわ",     wrong: ["かいご", "かいふ", "かいぶ"], meaning: "conversation" },
  { kanji: "自分",   reading: "じぶん",     wrong: ["じふん", "じぶ", "じふ"], meaning: "oneself" },
  { kanji: "記事",   reading: "きじ",       wrong: ["きし", "きす", "きず"], meaning: "article (newspaper/magazine)" },
  { kanji: "理解",   reading: "りかい",     wrong: ["りけい", "りかい", "りかい"], meaning: "understanding" },
  { kanji: "程度",   reading: "ていど",     wrong: ["ていとう", "ていど", "ていとう"], meaning: "degree / level / extent" },
  { kanji: "具体",   reading: "ぐたい",     wrong: ["こたい", "ぐだい", "こだい"], meaning: "concrete / specific" },
  { kanji: "人柄",   reading: "ひとがら",   wrong: ["ひとがら", "ひとがら", "ひとがら"], meaning: "personality / character (of a person)" },
  { kanji: "聞き手", reading: "ききて",     wrong: ["ききて", "ききて", "ききて"], meaning: "listener" },
  { kanji: "選択",   reading: "せんたく",   wrong: ["せんたく", "せんたく", "せんたく"], meaning: "selection / choice" }
];

// Validate: ensure no duplicate wrong answers and correct answer not in wrong list
quizData.forEach(function(q, i) {
  var all = [q.reading].concat(q.wrong);
  var unique = all.filter(function(v, idx) { return all.indexOf(v) === idx; });
  if (unique.length < 4) {
    console.warn("Question " + i + " (" + q.kanji + ") has duplicate readings. Fixing...");
    // Generate unique distractors by modifying vowels/consonants
    var fixed = [];
    for (var j = 0; j < q.wrong.length; j++) {
      var w = q.wrong[j];
      if (w === q.reading || fixed.indexOf(w) !== -1) {
        // Create a variant by changing first mora
        var map = {"さ":"し","た":"ち","な":"に","は":"ひ","ま":"み","や":"ゆ","ら":"り","わ":"を","が":"ぎ","ざ":"じ","だ":"ぢ","ば":"び","ぱ":"ぴ"};
        var first = w.charAt(0);
        var replacement = map[first] || (first.charCodeAt(0) % 2 === 0 ? "あ" : "か");
        w = replacement + w.slice(1);
        if (w === q.reading || fixed.indexOf(w) !== -1) {
          w = w + "っ";
        }
      }
      fixed.push(w);
    }
    q.wrong = fixed;
  }
});

let currentIndex = 0;
let score = 0;
let shuffled = [];
let wrongAnswers = [];

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i];
    a[i] = a[j];
    a[j] = tmp;
  }
  return a;
}

function startQuiz() {
  shuffled = shuffle(quizData.map(function(q, i) { return Object.assign({}, q, { _idx: i }); }));
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  showQuestion();
}

function showQuestion() {
  var q = shuffled[currentIndex];
  var quiz = document.getElementById("quiz");
  quiz.innerHTML =
    '<h1>\u65e5\u672c\u8a9e\u30af\u30a4\u30ba</h1>' +
    '<div class="subtitle">\u7b2c6\u56de 5/26 \u8b58\u307f\u30af\u30a4\u30ba</div>' +
    '<div class="progress">' + (currentIndex + 1) + ' / ' + shuffled.length + '</div>' +
    '<div class="question-type">\u8aad\u307f\u30af\u30a4\u30ba</div>' +
    '<div class="kanji-word">' + q.kanji + '</div>' +
    '<div class="instruction">\u6b63\u3057\u3044\u8aad\u307f\u3092\u9078\u3093\u3067\u304f\u3060\u3055\u3044</div>' +
    '<div class="choices" id="choices"></div>' +
    '<div class="result-box" id="result">' +
      '<div class="label" id="resultLabel"></div>' +
      '<div class="reading" id="resultReading"></div>' +
      '<div class="meaning" id="resultMeaning"></div>' +
    '</div>' +
    '<button class="next-btn" id="nextBtn" onclick="nextQuestion()">' +
      (currentIndex < shuffled.length - 1 ? '\u6b21\u3078 \u2192' : '\u7d50\u679c\u3092\u898b\u308b \u2192') +
    '</button>';

  // Build choices: correct + 3 wrong, shuffled
  var choices = [q.reading].concat(q.wrong);
  var order = shuffle(choices.map(function(_, i) { return i; }));

  var choicesEl = document.getElementById("choices");
  order.forEach(function(ci) {
    var btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = choices[ci];
    btn.dataset.value = choices[ci];
    btn.onclick = function() { checkAnswer(btn, choices[ci], q); };
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, q) {
  var buttons = document.querySelectorAll(".choice-btn");
  buttons.forEach(function(b) { b.disabled = true; });

  var isCorrect = chosen === q.reading;
  if (isCorrect) {
    score++;
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
    buttons.forEach(function(b) {
      if (b.dataset.value === q.reading) b.classList.add("correct");
    });
    wrongAnswers.push({
      kanji: q.kanji,
      reading: q.reading,
      meaning: q.meaning,
      yourAnswer: chosen
    });
  }

  var resultBox = document.getElementById("result");
  resultBox.classList.add("show");
  resultBox.classList.add(isCorrect ? "correct" : "wrong");
  document.getElementById("resultLabel").textContent = isCorrect ? "\u2713 \u6b63\u89e3\uff01" : "\u2717 \u4e0d\u6b63\u89e3";
  document.getElementById("resultReading").textContent = q.reading;
  document.getElementById("resultMeaning").textContent = q.meaning;
  document.getElementById("nextBtn").classList.add("show");
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < shuffled.length) {
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  var quiz = document.getElementById("quiz");
  var pct = Math.round((score / shuffled.length) * 100);
  var message = "";
  if (pct === 100) message = "\u5b8c\u738b\u3067\u3059\uff01\u7d20\u660e\u3089\u3057\u3044\uff01";
  else if (pct >= 80) message = "\u3088\u304f\u3067\u304d\u307e\u3057\u305f\uff01";
  else if (pct >= 60) message = "\u3082\u3046\u3053\u3063\u3068\u7df4\u7fd2\u3057\u3088\u3046\uff01";
  else message = "\u8907\u7fd9\u3057\u3066\u304b\u3089\u3082\u3046\u4e00\u5ea6\uff01";

  var reviewHTML = "";
  if (wrongAnswers.length > 0) {
    reviewHTML = '<div class="review-list"><strong>\u9593\u9055\u3048\u305f\u554f\u984c\uff1a</strong><br>';
    wrongAnswers.forEach(function(w) {
      reviewHTML += '<span class="kanji-review">' + w.kanji + '</span> ' + w.reading + '<br>';
      reviewHTML += '&nbsp;&nbsp;' + w.meaning + '<br>';
    });
    reviewHTML += '</div>';
  }

  quiz.innerHTML =
    '<div class="score-screen">' +
      '<h1>\u7d50\u679c</h1>' +
      '<div class="score">' + score + ' / ' + shuffled.length + '</div>' +
      '<div class="message">' + message + '</div>' +
      reviewHTML +
      '<button class="restart-btn" onclick="startQuiz()">\u3082\u3046\u4e00\u5ea6</button>' +
    '</div>';
}

startQuiz();
</script>
</body>
</html>
