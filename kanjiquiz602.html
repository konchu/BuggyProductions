<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanji Quiz - 0602</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .quiz-container {
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    font-size: 1.4em;
    margin-bottom: 8px;
    color: #e94560;
  }
  .subtitle {
    text-align: center;
    font-size: 0.8em;
    color: #666;
    margin-bottom: 16px;
  }
  .progress {
    text-align: center;
    font-size: 0.85em;
    color: #888;
    margin-bottom: 24px;
  }
  .kanji-word {
    text-align: center;
    font-size: 3em;
    margin: 20px 0;
    color: #fff;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 24px 0;
  }
  .choice-btn {
    background: #0f3460;
    border: 2px solid #0f3460;
    color: #e0e0e0;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 1.3em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .choice-btn:hover:not(:disabled) {
    background: #1a4a7a;
    border-color: #e94560;
  }
  .choice-btn.correct {
    background: #2d6a4f;
    border-color: #52b788;
    color: #fff;
  }
  .choice-btn.wrong {
    background: #6a2d2d;
    border-color: #e94560;
    color: #fff;
  }
  .result-box {
    text-align: center;
    padding: 16px;
    border-radius: 10px;
    margin: 16px 0;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.correct { background: #2d6a4f; }
  .result-box.wrong { background: #6a2d2d; }
  .result-box .meaning {
    font-size: 1.1em;
    margin-top: 8px;
    color: #ccc;
  }
  .next-btn {
    display: none;
    width: 100%;
    background: #e94560;
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 10px;
    font-size: 1.1em;
    cursor: pointer;
    margin-top: 12px;
  }
  .next-btn:hover { background: #c73652; }
  .next-btn.show { display: block; }
  .score-screen {
    text-align: center;
  }
  .score-screen .score {
    font-size: 3em;
    color: #e94560;
    margin: 20px 0;
  }
  .restart-btn {
    background: #e94560;
    border: none;
    color: #fff;
    padding: 14px 40px;
    border-radius: 10px;
    font-size: 1.1em;
    cursor: pointer;
    margin-top: 20px;
  }
  .restart-btn:hover { background: #c73652; }
</style>
</head>
<body>
<div class="quiz-container" id="quiz">
  <h1>漢字クイズ</h1>
  <div class="subtitle">Topic 1 Part 4 — 書道でコミュニケーションを</div>
  <div class="progress" id="progress">1 / 20</div>
  <div class="kanji-word" id="word"></div>
  <div class="choices" id="choices"></div>
  <div class="result-box" id="result">
    <div id="resultText"></div>
    <div class="meaning" id="meaning"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次へ →</button>
</div>

<script>
const words = [
  { kanji: "書道", reading: "しょどう", meaning: "calligraphy" },
  { kanji: "身近", reading: "みぢか", meaning: "nearby" },
  { kanji: "インタビュー記事", reading: "インタビューきじ", meaning: "interview article" },
  { kanji: "暮らす", reading: "くらする", meaning: "live" },
  { kanji: "教師", reading: "きょうし", meaning: "teacher" },
  { kanji: "構成", reading: "こうせい", meaning: "composition / structure" },
  { kanji: "国際交流", reading: "こくさいこうりゅう", meaning: "international exchange" },
  { kanji: "きっかけ", reading: "きっかけ", meaning: "trigger / beginning" },
  { kanji: "留学する", reading: "りゅうがくする", meaning: "study abroad" },
  { kanji: "人生", reading: "じんせい", meaning: "life" },
  { kanji: "思い出す", reading: "おもいだす", meaning: "remember" },
  { kanji: "時代", reading: "じだい", meaning: "age / era" },
  { kanji: "進む", reading: "すすむ", meaning: "advance / move forward" },
  { kanji: "師範", reading: "しはん", meaning: "master teacher" },
  { kanji: "資格", reading: "しかく", meaning: "qualification" },
  { kanji: "取得する", reading: "しゅとくする", meaning: "obtain / acquire" },
  { kanji: "魅力", reading: "みりょく", meaning: "charm / attraction" },
  { kanji: "伝える", reading: "つたえる", meaning: "convey / pass on" },
  { kanji: "経験", reading: "けいけん", meaning: "experience" },
  { kanji: "印象的な", reading: "いんしょうてきな", meaning: "impressive" }
];

let currentIndex = 0;
let score = 0;
let shuffled = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  shuffled = shuffle([...words]);
  currentIndex = 0;
  score = 0;
  document.getElementById('quiz').style.display = '';
  document.getElementById('quiz').innerHTML = `
    <h1>漢字クイズ</h1>
    <div class="subtitle">Topic 1 Part 4 — 書道でコミュニケーションを</div>
    <div class="progress" id="progress">1 / ${shuffled.length}</div>
    <div class="kanji-word" id="word"></div>
    <div class="choices" id="choices"></div>
    <div class="result-box" id="result">
      <div id="resultText"></div>
      <div class="meaning" id="meaning"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次へ →</button>
  `;
  showQuestion();
}

function showQuestion() {
  const q = shuffled[currentIndex];
  document.getElementById('progress').textContent = `${currentIndex + 1} / ${shuffled.length}`;
  document.getElementById('word').textContent = q.kanji;
  document.getElementById('result').className = 'result-box';
  document.getElementById('result').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  // Build 4 choices: correct + 3 random wrong answers
  const wrong = words
    .filter(w => w.reading !== q.reading)
    .map(w => w.reading);
  const choices = shuffle([q.reading, ...wrong.slice(0, 3)]);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => checkAnswer(btn, c, q);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, q) {
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = chosen === q.reading;
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b => {
      if (b.textContent === q.reading) b.classList.add('correct');
    });
  }

  const resultBox = document.getElementById('result');
  resultBox.classList.add('show');
  resultBox.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('resultText').textContent = isCorrect ? '\u2713 正解\uff01' : '\u2717 不正解';
  document.getElementById('meaning').textContent = `${q.kanji} = ${q.meaning}`;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < shuffled.length) {
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('quiz').innerHTML = `
    <div class="score-screen">
      <h1>結果</h1>
      <div class="score">${score} / ${shuffled.length}</div>
      <p>${score === shuffled.length ? '\u5b8c\u7f8e\u3067\u3059\uff01' : score >= shuffled.length * 0.7 ? '\u3088\u304f\u3067\u304d\u307e\u3057\u305f\uff01' : '\u3082\u3046\u4e00\u5ea6\u6311\u6319\u3057\u3088\u3046\uff01'}</p>
      <button class="restart-btn" onclick="startQuiz()">もう一度</button>
    </div>
  `;
}

startQuiz();
</script>
</body>
</html>
